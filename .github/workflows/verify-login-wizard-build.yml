# Garante que o bundle em `frontend/build` está alinhado com o código React.
# O Streamlit Community Cloud não corre `npm run build`; o que está em Git é o que vai para produção.
name: Verify login wizard build

on:
  push:
    paths:
      - "watty_login_wizard/frontend/**"
      - ".github/workflows/verify-login-wizard-build.yml"
  pull_request:
    paths:
      - "watty_login_wizard/frontend/**"
      - ".github/workflows/verify-login-wizard-build.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: watty_login_wizard/frontend/package-lock.json

      - name: Build login wizard
        working-directory: watty_login_wizard/frontend
        run: npm ci && npm run build

      - name: Committed build must match fresh build
        run: git diff --exit-code watty_login_wizard/frontend/build
