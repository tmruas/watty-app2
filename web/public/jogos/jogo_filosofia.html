<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WATTY - Feed das Falácias</title>
    <style>
        :root {
            /* Paleta Dark Mode WATTY */
            --bg-dark: #0D0814;
            --app-dark: #1A1025;
            --post-bg: #26183A;
            --purple-main: #9B5DE5;
            --purple-neon: #B57EDC;
            --magenta: #F15BB5;
            --white: #FFFFFF;
            --text-light: #E0D7F0;
            --success: #00E676;
            --error: #FF3366;
            --tag-red: #E63946;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: var(--white);
            overflow: hidden;
        }

        .app-container {
            background: var(--app-dark);
            width: 100%;
            max-width: 450px;
            height: 95vh;
            max-height: 850px;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(155, 93, 229, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .level-badge { background: var(--purple-main); color: white; padding: 5px 15px; border-radius: 15px; font-weight: bold; font-size: 13px; text-transform: uppercase; box-shadow: 0 0 10px rgba(155, 93, 229, 0.5); }
        .xp-container { flex-grow: 1; margin: 0 15px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, var(--magenta), var(--purple-main)); width: 0%; transition: width 0.5s ease; }

        /* Watty Box (Dark Mode) */
        .watty-box { display: flex; align-items: center; gap: 15px; background: rgba(155, 93, 229, 0.1); padding: 12px 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--purple-main); transition: all 0.3s ease; }
        .watty-box.error-state { border-color: var(--error); background: rgba(255, 51, 102, 0.1); }
        .watty-box.success-state { border-color: var(--success); background: rgba(0, 230, 118, 0.1); }
        .watty-avatar { width: 45px; height: 45px; background: var(--purple-main); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 0 15px rgba(155, 93, 229, 0.6); }
        .watty-speech { font-size: 12px; font-weight: 500; line-height: 1.3; color: var(--text-light); }

        /* Área do Post (O Alvo) */
        .feed-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; perspective: 1000px; z-index: 10; margin-bottom: 15px;}
        
        .social-post {
            width: 100%;
            background: var(--post-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            overflow: hidden;
        }

        .social-post.drag-over {
            transform: scale(1.02);
            border-color: var(--magenta);
            box-shadow: 0 0 20px rgba(241, 91, 181, 0.4);
        }

        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; color: white; background: linear-gradient(45deg, #FF6B6B, #4ECDC4); }
        .post-handle { font-weight: 800; font-size: 15px; letter-spacing: 0.5px; }
        .post-time { color: #888; font-size: 12px; font-weight: normal; }

        .post-content { font-size: 16px; line-height: 1.5; margin-bottom: 20px; color: var(--text-light); }
        .post-hashtag { color: var(--magenta); font-weight: bold; }

        /* Viral Meter */
        .post-footer { display: flex; justify-content: flex-start; gap: 20px; font-weight: 900; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .stat-item { display: flex; align-items: center; gap: 8px; transition: color 0.2s; }
        .stat-icon { font-size: 18px; }
        .likes-count.danger { color: var(--error); animation: pulseDanger 0.5s infinite; }

        @keyframes pulseDanger { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); text-shadow: 0 0 10px var(--error); } }

        /* Carimbo de Falácia */
        .stamp {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(3) rotate(-15deg);
            color: var(--error);
            border: 4px solid var(--error);
            padding: 10px 20px;
            font-size: 24px;
            font-weight: 900;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: none;
            box-shadow: inset 0 0 10px rgba(255, 51, 102, 0.5), 0 0 15px rgba(255, 51, 102, 0.5);
            text-shadow: 0 0 5px rgba(255, 51, 102, 0.8);
            background: rgba(13, 8, 20, 0.8);
            z-index: 20;
        }

        .stamp.show { animation: stampDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stampDown {
            0% { transform: translate(-50%, -50%) scale(3) rotate(-15deg); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(-15deg); opacity: 1; }
        }

        /* Tags de Community Notes */
        .tags-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 180px;
            overflow-y: auto;
        }

        .fallacy-tag {
            background: var(--tag-red);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.4);
            user-select: none;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.2s;
            border: 2px solid transparent;
        }

        .fallacy-tag:active { cursor: grabbing; transform: scale(0.95); }
        .fallacy-tag.selected { border-color: var(--white); transform: scale(1.05) translateY(-5px); box-shadow: 0 8px 15px rgba(230, 57, 70, 0.6); }

        /* Modal Overlay */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 8, 20, 0.95); border-radius: 26px; z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 30px;}
        
        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 20px; background: linear-gradient(45deg, var(--purple-main), var(--magenta)); color: white; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(155, 93, 229, 0.3); transition: transform 0.2s; margin-top: 20px; }
        .btn-primary:active { transform: scale(0.97); }

        .rank-title { color: var(--magenta); font-size: 24px; font-weight: 900; margin: 15px 0; text-transform: uppercase;}

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }

        /* Custom Scrollbar for tags pool */
        .tags-pool::-webkit-scrollbar { width: 6px; }
        .tags-pool::-webkit-scrollbar-thumb { background: var(--purple-main); border-radius: 10px; }
    </style>
</head>
<body>

<div class="app-container" id="gameWindow">
    
    <div class="top-bar">
        <div class="level-badge">LÓGICA</div>
        <div class="xp-container"><div class="xp-bar" id="ui-xp-bar"></div></div>

    <div class="feed-area">

                <div class="post-avatar" id="post-avatar">M</div>

                </div>
                <div class="stat-item" style="color: #888;">
                    <span class="stat-icon">🔁</span>

    <div class="tags-pool" id="tags-pool">
        </div>

    <div class="modal-overlay" id="modal-end">

        <h2>ANÁLISE CONCLUÍDA</h2>

        <div class="rank-title" id="final-rank">Troll de Internet</div>
        <button class="btn-primary" onclick="initGame()">NOVA SESSÃO (BARALHAR)</button>
    </div>
</div>

        // --- APELO À MAIORIA (Ad Populum) ---
        { id: "ad_populum", avatar: "T", handle: "@Tiago_Trend", color: "linear-gradient(45deg, #00FFFF, #00BFFF)", text: "Toda a gente na escola está a jogar isto, por isso tem de ser o melhor jogo do ano! 📱🎮", errorFeedback: "O facto de algo ser muito popular não significa que seja objetivamente bom ou verdadeiro." },
        { id: "ad_populum", avatar: "M", handle: "@Marta_Astros", color: "linear-gradient(45deg, #9370DB, #8A2BE2)", text: "Milhões de pessoas leem o horóscopo. Logo, a astrologia tem de ter um fundo científico. ♈🔮", errorFeedback: "A crença das massas não substitui as provas metodológicas ou científicas." }
    ];

    // DEFINIÇÃO DA SESSÃO
    const ROUNDS_PER_GAME = 5;
    let playQueue = [];
    let currentPostIndex = 0;
    let score = 0;
    
    // Viral Meter Variables
    let likes = 0;
    let retweets = 0;
    let viralInterval;
    let isRoundActive = false;
    const VIRAL_LIMIT = 15000;

    // UI Elements
    const postAvatar = document.getElementById('post-avatar');
    const postHandle = document.getElementById('post-handle');
    const postText = document.getElementById('post-text');
    const likesCounter = document.getElementById('likes-counter');
    const rtCounter = document.getElementById('rt-counter');
    const stamp = document.getElementById('stamp');
    const wattyContainer = document.getElementById('watty-container');
    const wattyText = document.getElementById('watty-text');
    const postTarget = document.getElementById('post-target');
    const tagsPool = document.getElementById('tags-pool');

    function initGame() {
        document.getElementById('modal-end').style.display = 'none';
        
        // Setup Tags UI (Sempre baralhadas)
        tagsPool.innerHTML = '';
        let shuffledTags = [...tagsList].sort(() => Math.random() - 0.5);
        shuffledTags.forEach(tag => {
            const btn = document.createElement('div');
            btn.className = 'fallacy-tag';
            btn.id = tag.id;
            btn.innerText = tag.label;
            btn.draggable = true;
            btn.ondragstart = drag;
            btn.onclick = () => selectTagMobile(btn);
            tagsPool.appendChild(btn);
        });

        // Setup Posts Queue (Garante apenas 5 posts por sessão)
        let shuffledPosts = [...allPostsData].sort(() => Math.random() - 0.5);
        playQueue = shuffledPosts.slice(0, ROUNDS_PER_GAME);
        
        currentPostIndex = 0;
        score = 0;
        document.getElementById('ui-score').innerText = score;
        document.getElementById('ui-xp-bar').style.width = "0%";

        loadPost();
    }

    function loadPost() {
        // Se já passaram os 5 posts, termina o jogo
        if (currentPostIndex >= playQueue.length) {
            endGame(); 
            return;
        }

        const data = playQueue[currentPostIndex];
        
        // Reset UI do Post
        stamp.classList.remove('show');
        stamp.style.color = 'var(--error)';
        stamp.style.borderColor = 'var(--error)';
        stamp.innerText = "FALÁCIA DETETADA";
        postTarget.style.opacity = '1';
        postTarget.style.transform = 'scale(1)';
        wattyContainer.className = 'watty-box';
        wattyText.innerText = `[Post ${currentPostIndex + 1} de ${ROUNDS_PER_GAME}] Identifica a falácia antes que o post atinja 10.000 likes!`;
        likesCounter.classList.remove('danger');
        
        // Preencher Dados do Post
        postAvatar.innerText = data.avatar;
        postAvatar.style.background = data.color;
        postHandle.innerText = data.handle;
        postText.innerHTML = data.text;

        // Reset Counters do Viral Meter
        likes = Math.floor(Math.random() * 50);
        retweets = Math.floor(likes / 3);
        updateCounters();

        isRoundActive = true;
        startViralMeter();
    }

    function startViralMeter() {
        clearInterval(viralInterval);
        viralInterval = setInterval(() => {
            if(!isRoundActive) return;

            let jump = Math.floor(Math.random() * 150) + 70;
            if(likes > 7000) jump += 100; // Pânico no final

            likes += jump;
            retweets += Math.floor(jump * 0.4);

            updateCounters();

            if (likes > 7500) likesCounter.classList.add('danger');

            if (likes >= VIRAL_LIMIT) {
                likes = VIRAL_LIMIT;
                updateCounters();
                postWentViral();
            }
        }, 100);
    }

    function updateCounters() {
        likesCounter.innerText = likes.toLocaleString('pt-PT');
        rtCounter.innerText = retweets.toLocaleString('pt-PT');
    }

    // ---------------------------------------------------------
    // LÓGICA DE VERIFICAÇÃO (Sucesso / Erro / Timeout)
    // ---------------------------------------------------------
    function processFallacy(tagId) {
        if (!isRoundActive) return;
        
        const currentData = playQueue[currentPostIndex];

        if (tagId === currentData.id) {
            // SUCESSO! Acertou na Falácia
            isRoundActive = false;
            clearInterval(viralInterval);
            
            score++;
            document.getElementById('ui-score').innerText = score;
            document.getElementById('ui-xp-bar').style.width = ((currentPostIndex + 1) / ROUNDS_PER_GAME * 100) + "%";

            likes = 0; retweets = 0; updateCounters();
            likesCounter.classList.remove('danger');
            
            stamp.style.color = 'var(--success)';
            stamp.style.borderColor = 'var(--success)';
            stamp.innerText = "BLOQUEADO!";
            stamp.classList.add('show');
            
            wattyContainer.className = 'watty-box success-state';
            wattyText.innerText = "Brilhante! A desinformação foi travada a tempo.";
            
            if(navigator.vibrate) navigator.vibrate(100);
            
            // Avança para o próximo post após breve pausa
            setTimeout(nextRound, 2500);
        } else {
            // ERRO! Falácia incorreta
            likes += 2000; 
            if(likes >= VIRAL_LIMIT) likes = VIRAL_LIMIT - 100; 
            
            const win = document.getElementById('gameWindow');
            win.classList.add('shake');
            setTimeout(() => win.classList.remove('shake'), 400);

            wattyContainer.className = 'watty-box error-state';
            wattyText.innerHTML = currentData.errorFeedback;
            
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
    }

    function postWentViral() {
        isRoundActive = false;
        clearInterval(viralInterval);
        
        stamp.style.color = 'var(--error)';
        stamp.style.borderColor = 'var(--error)';
        stamp.innerText = "VIRALIZOU! 💀";
        stamp.classList.add('show');

        // Atualiza a barra de XP visualmente mas não ganha pontos
        document.getElementById('ui-xp-bar').style.width = ((currentPostIndex + 1) / ROUNDS_PER_GAME * 100) + "%";

        wattyContainer.className = 'watty-box error-state';
        wattyText.innerText = `Lento demais! A resposta correta era: ${getLabelFromId(playQueue[currentPostIndex].id)}.`;

        if(navigator.vibrate) navigator.vibrate(500);
        
        // Avança para o próximo post mesmo se tiver errado
        setTimeout(nextRound, 3000);
    }

    function getLabelFromId(id) {
        return tagsList.find(t => t.id === id).label;
    }

    function nextRound() {
        postTarget.style.opacity = '0';
        postTarget.style.transform = 'scale(0.9)';
        setTimeout(() => {
            currentPostIndex++; // Aqui está a lógica central da progressão
            loadPost(); // Se index >= 5, esta função dispara o endGame()
        }, 300);
    }

    // ---------------------------------------------------------
    // DRAG & DROP (Desktop)
    // ---------------------------------------------------------
    function drag(ev) {
        if (!isRoundActive) return;
        ev.dataTransfer.setData("text", ev.target.id);
    }

    function allowDrop(ev) {
        ev.preventDefault();
        if(isRoundActive) postTarget.classList.add('drag-over');
    }

    function drop(ev) {
        ev.preventDefault();
        postTarget.classList.remove('drag-over');
        if (!isRoundActive) return;
        const tagId = ev.dataTransfer.getData("text");
        processFallacy(tagId);
    }

    postTarget.addEventListener('dragleave', () => postTarget.classList.remove('drag-over'));

    // ---------------------------------------------------------
    // CLICK/TOUCH (Mobile)
    // ---------------------------------------------------------
    let selectedTag = null;

    function selectTagMobile(tagElement) {
        if (!isRoundActive) return;
        if (selectedTag) selectedTag.classList.remove('selected');
        
        if (selectedTag === tagElement) {
            selectedTag = null; 
        } else {
            selectedTag = tagElement;
            tagElement.classList.add('selected');
        }
    }

    function dropMobile() {
        if (!isRoundActive || !selectedTag) return;
        const tagId = selectedTag.id;
        selectedTag.classList.remove('selected');
        selectedTag = null;
        processFallacy(tagId);
    }

    // ---------------------------------------------------------
    // FINAL DE JOGO (Ecrã Final após os 5 Posts)
    // ---------------------------------------------------------
    function endGame() {
        document.getElementById('final-score').innerText = score;
        
        let rank = ""; let icon = "";
        if (score <= 1) { rank = "Troll de Internet"; icon = "🧌"; }
        else if (score === 2) { rank = "Comentador de Bancada"; icon = "🗣️"; }
        else if (score === 3) { rank = "Detetive da Lógica"; icon = "🕵️‍♂️"; }
        else if (score === 4) { rank = "Rei/Rainha das 'Notes'"; icon = "👑"; }
        else { rank = "Aristóteles do Twitter"; icon = "🏛️"; }

        document.getElementById('final-rank').innerText = rank;
        document.getElementById('modal-icon').innerText = icon;
        document.getElementById('modal-end').style.display = 'flex';
    }

    // Arranca
    initGame();
</script>

</body>
</html>
