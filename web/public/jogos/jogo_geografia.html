<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WATTY - Geo-Alvo (Modo Exame)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-dark: #0D0814;
            --app-dark: #1A1025;
            --purple-main: #9B5DE5;
            --purple-neon: #B57EDC;
            --magenta: #F15BB5;
            --white: #FFFFFF;
            --text-light: #E0D7F0;
            --success: #00E676;
            --warning: #FFD166;
            --error: #FF3366;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; }

        body {
            background-color: #0D0814;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: var(--white);
            overflow: hidden;
        }

        .app-container {
            background: var(--app-dark);
            width: 100%;
            max-width: 550px;
            height: 95vh;
            max-height: 850px;
            border-radius: 30px;
            padding: 15px 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 2px rgba(155, 93, 229, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Tabs de Navegação */
        .tabs-container { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 8px 5px; border: none; background: transparent; border-radius: 10px; font-size: 12px; font-weight: bold; color: var(--purple-neon); cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--purple-main); color: white; box-shadow: 0 4px 15px rgba(155, 93, 229, 0.4); }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .level-badge { background: var(--purple-main); color: white; padding: 5px 15px; border-radius: 15px; font-weight: bold; font-size: 13px; text-transform: uppercase; box-shadow: 0 0 10px rgba(155, 93, 229, 0.5); }
        .xp-container { flex-grow: 1; margin: 0 15px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, var(--magenta), var(--purple-main)); width: 0%; transition: width 0.5s ease; }

        /* Watty Box */
        .watty-box { display: flex; align-items: center; gap: 15px; background: rgba(155, 93, 229, 0.1); padding: 12px 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid var(--purple-main); transition: all 0.3s ease; }
        .watty-box.error-state { border-color: var(--error); background: rgba(255, 51, 102, 0.1); }
        .watty-box.success-state { border-color: var(--success); background: rgba(0, 230, 118, 0.1); }
        .watty-avatar { width: 45px; height: 45px; background: var(--purple-main); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 0 15px rgba(155, 93, 229, 0.6); }
        .watty-speech { font-size: 13px; font-weight: 600; line-height: 1.3; color: var(--text-light); }

        /* Área do Mapa Real */
        #map {
            flex-grow: 1;
            border-radius: 20px;
            border: 2px solid rgba(155, 93, 229, 0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            z-index: 10;
        }

        /* Estilo dos Pinos no Mapa (Leaflet Custom Icons) */
        .custom-user-pin {
            background-color: var(--magenta);
            width: 20px; height: 20px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(241, 91, 181, 0.8);
        }

        .custom-target-pin {
            background-color: var(--success);
            width: 24px; height: 24px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.8);
            animation: pulseTarget 1.5s infinite alternate;
        }

        @keyframes pulseTarget {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(0, 230, 118, 0.5); }
            100% { transform: scale(1.2); box-shadow: 0 0 30px rgba(0, 230, 118, 1); }
        }

        /* Botão Principal */
        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 20px; background: linear-gradient(45deg, var(--purple-main), var(--magenta)); color: white; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(155, 93, 229, 0.3); transition: transform 0.2s; margin-top: 15px; z-index: 20;}
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { background: #3B2A50; cursor: not-allowed; box-shadow: none; color: #888;}

        /* Modal Overlay */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 8, 20, 0.95); border-radius: 26px; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 30px;}
        
        .rank-title { color: var(--warning); font-size: 32px; font-weight: 900; margin: 15px 0; text-transform: uppercase; text-shadow: 0 0 15px rgba(255, 209, 102, 0.5);}

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
        .leaflet-control-attribution { display: none; }
    </style>
</head>
<body>

<div class="app-container" id="gameWindow">
    
    <div class="tabs-container">
        <button class="tab-btn active" id="tab-10" onclick="setGameMode(10)">10º Ano</button>
        <button class="tab-btn" id="tab-11" onclick="setGameMode(11)">11º Ano</button>
        <button class="tab-btn" id="tab-global" onclick="setGameMode('global')">GLOBAL</button>
    </div>

    <div class="top-bar">
        <div class="level-badge">GEOGRAFIA A</div>
        <div class="xp-container"><div class="xp-bar" id="ui-xp-bar"></div></div>
        <div style="font-weight: bold; font-size: 12px; color: var(--purple-neon);"><span id="ui-score">0</span> XP</div>
    </div>

    <div class="watty-box" id="watty-container">
        <div class="watty-avatar">📍</div>
        <div class="watty-speech" id="watty-text">A iniciar satélites...</div>
    </div>

    <div id="map"></div>

    <button class="btn-primary" id="btn-submit" onclick="verifyLocation()" disabled>CONFIRMAR LOCALIZAÇÃO</button>

    <div class="modal-overlay" id="modal-end">
        <div style="font-size: 60px; margin-bottom: 5px;" id="modal-icon">🌍</div>
        <h2>SESSÃO CONCLUÍDA</h2>
        <p>A tua precisão geográfica rendeu-te:</p>
        <div class="rank-title"><span id="final-score">0</span> XP</div>
        <button class="btn-primary" onclick="initGame()">NOVA SESSÃO (BARALHAR)</button>
    </div>
</div>

<script>
    // ---------------------------------------------------------
    // BASE DE DADOS (Sem dicas no texto!)
    // ---------------------------------------------------------
    const geoData = [
        // --- 10º ANO ---
        { ano: 10, tema: "Demografia", text: "Localiza a sub-região que regista o maior índice de envelhecimento e de despovoamento em Portugal Continental.", lat: 39.92, lng: -7.07, feedback: "A região da Beira Baixa sofre fortemente com o êxodo rural e desertificação." },
        { ano: 10, tema: "Demografia", text: "Onde se regista a maior densidade populacional absoluta e concentração de serviços em Portugal?", lat: 38.72, lng: -9.14, feedback: "A Área Metropolitana de Lisboa concentra a maior fatia da população." },
        { ano: 10, tema: "Clima", text: "Localiza o Parque Nacional Peneda-Gerês, a zona com maior precipitação média anual do país.", lat: 41.80, lng: -8.15, feedback: "O Noroeste de Portugal é muito chuvoso devido ao relevo e proximidade do Atlântico." },
        { ano: 10, tema: "Clima", text: "Identifica a região de Amareleja, conhecida pelas temperaturas estivais extremas e elevada aridez.", lat: 38.20, lng: -7.21, feedback: "O interior do Alentejo regista os climas mais quentes e secos no verão." },
        { ano: 10, tema: "Clima Insular", text: "Localiza a ilha de São Miguel, fortemente influenciada pelo anticiclone que lhe dá o nome.", lat: 37.78, lng: -25.45, feedback: "O arquipélago dos Açores tem um clima temperado marítimo muito húmido." },
        
        // --- 11º ANO ---
        { ano: 11, tema: "Indústria", text: "Localiza o Vale do Ave, o principal núcleo histórico da Indústria Têxtil e do Calçado.", lat: 41.44, lng: -8.29, feedback: "O Norte Litoral (Guimarães/Famalicão) é o motor tradicional da indústria têxtil." },
        { ano: 11, tema: "Turismo", text: "Onde se concentra o principal polo de turismo balnear sazonal de massas em Portugal?", lat: 37.08, lng: -8.24, feedback: "A costa sul do Algarve é o destino mais dependente do conceito 'sol e mar'." },
        { ano: 11, tema: "Agricultura", text: "Localiza a região de Coruche, tradicionalmente associada ao 'Montado' e à grande produção de Cortiça.", lat: 38.95, lng: -8.52, feedback: "A bacia do Tejo e o Alentejo concentram a maior mancha de montado do mundo." },
        { ano: 11, tema: "Agricultura", text: "Identifica o centro histórico da região do Douro Vinhateiro.", lat: 41.16, lng: -7.78, feedback: "A zona em redor do Peso da Régua é o coração da mais antiga região vinícola demarcada do mundo." },
        { ano: 11, tema: "Turismo Insular", text: "Localiza a ilha da Madeira, famosa pelo turismo de natureza, escarpas e porto de cruzeiros.", lat: 32.66, lng: -16.92, feedback: "O Funchal e a Ilha da Madeira têm um turismo forte e constante durante todo o ano." },
        { ano: 11, tema: "Infraestruturas", text: "Onde se localiza o complexo industrial-portuário de águas profundas de Sines?", lat: 37.95, lng: -8.86, feedback: "O porto de Sines é a principal infraestrutura energética e logística de contentores do país." }
    ];

    const ROUNDS_PER_GAME = 5;
    let playQueue = [];
    let currentRoundIndex = 0;
    let currentScore = 0;
    
    // Variáveis Leaflet
    let map;
    let userMarker = null;
    let targetMarker = null;
    let distanceLine = null;
    let isVerifying = false;

    // Ícones Personalizados
    const userIcon = L.divIcon({ className: 'custom-user-pin', iconSize: [20, 20], iconAnchor: [10, 20] });
    const targetIcon = L.divIcon({ className: 'custom-target-pin', iconSize: [24, 24], iconAnchor: [12, 12] });

    // Elementos UI
    const btnSubmit = document.getElementById('btn-submit');
    const wattyContainer = document.getElementById('watty-container');
    const wattyText = document.getElementById('watty-text');

    function initMap() {
        if (map) { map.remove(); }
        
        map = L.map('map', {
            center: [39.5, -8.0],
            zoom: 6,
            zoomControl: false 
        });

        // Fornecedor de Mapas (Esri World Street Map)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 12,
            minZoom: 4
        }).addTo(map);

        map.on('click', function(e) {
            if (isVerifying) return; 

            if (userMarker) {
                userMarker.setLatLng(e.latlng);
            } else {
                userMarker = L.marker(e.latlng, {icon: userIcon}).addTo(map);
            }
            
            btnSubmit.disabled = false;
            wattyText.innerHTML = "Pino colocado! Podes afinar a posição ou clicar em Confirmar.";
        });
    }

    function shuffleArray(array) {
        return array.slice().sort(() => Math.random() - 0.5);
    }

    function setGameMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${mode}`).classList.add('active');

        let filteredData = (mode === 'global') ? [...geoData] : geoData.filter(q => q.ano === mode);
        playQueue = shuffleArray(filteredData).slice(0, ROUNDS_PER_GAME);

        initGame();
    }

    function initGame() {
        document.getElementById('modal-end').style.display = 'none';
        currentRoundIndex = 0;
        currentScore = 0;
        document.getElementById('ui-score').innerText = currentScore;
        document.getElementById('ui-xp-bar').style.width = "0%";

        initMap(); 
        loadQuestion();
    }

    function loadQuestion() {
        // Se já fizemos as 5 rondas, acaba o jogo!
        if (currentRoundIndex >= playQueue.length) {
            endGame(); 
            return;
        }

        const data = playQueue[currentRoundIndex];
        isVerifying = false;
        
        // Limpar Marcadores Antigos
        if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
        if (targetMarker) { map.removeLayer(targetMarker); targetMarker = null; }
        if (distanceLine) { map.removeLayer(distanceLine); distanceLine = null; }
        
        // RESETAR O BOTÃO
        btnSubmit.innerText = "CONFIRMAR LOCALIZAÇÃO";
        btnSubmit.disabled = true;
        btnSubmit.onclick = verifyLocation;
        
        wattyContainer.className = 'watty-box';
        wattyText.innerHTML = `<strong>Ronda ${currentRoundIndex + 1}/${ROUNDS_PER_GAME} | ${data.tema}:</strong><br>${data.text}`;

        // Resetar câmara
        if (data.text.includes("Açores") || data.text.includes("São Miguel")) {
            map.setView([38.5, -28.0], 5); 
        } else if (data.text.includes("Madeira")) {
            map.setView([32.6, -16.9], 7); 
        } else {
            map.setView([39.5, -8.0], 6); 
        }
    }

    // ---------------------------------------------------------
    // VERIFICAÇÃO E PONTUAÇÃO REAL
    // ---------------------------------------------------------
    function verifyLocation() {
        if (!userMarker || isVerifying) return;
        isVerifying = true;
        
        const data = playQueue[currentRoundIndex];
        const targetLatLng = L.latLng(data.lat, data.lng);
        const userLatLng = userMarker.getLatLng();

        // Mostrar Alvo e Linha
        targetMarker = L.marker(targetLatLng, {icon: targetIcon}).addTo(map);
        distanceLine = L.polyline([userLatLng, targetLatLng], {
            color: 'var(--magenta)', 
            weight: 3, 
            dashArray: '5, 10'
        }).addTo(map);

        map.fitBounds(distanceLine.getBounds(), { padding: [50, 50], maxZoom: 8 });

        // CALCULAR DISTÂNCIA REAL 
        const distanceKm = userLatLng.distanceTo(targetLatLng) / 1000;

        let pts = 0;
        if (distanceKm <= 30) {
            pts = 500;
        } else if (distanceKm <= 250) {
            pts = Math.floor(500 * (1 - ((distanceKm - 30) / 220)));
        }

        // Atualizar XP na UI
        currentScore += pts;
        document.getElementById('ui-score').innerText = currentScore;
        document.getElementById('ui-xp-bar').style.width = ((currentRoundIndex + 1) / ROUNDS_PER_GAME * 100) + "%";

        // Feedback Textual
        let distanceStr = distanceKm.toFixed(1) + " km";
        
        if (pts >= 400) {
            wattyContainer.className = 'watty-box success-state';
            wattyText.innerHTML = `<strong>Na Mouche!</strong> (A apenas ${distanceStr})<br>Ganhaste +${pts}XP. ${data.feedback}`;
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else if (pts > 0) {
            wattyContainer.className = 'watty-box';
            wattyText.innerHTML = `<strong>Perto!</strong> (A ${distanceStr} de distância)<br>Recebeste +${pts}XP. ${data.feedback}`;
        } else {
            wattyContainer.className = 'watty-box error-state';
            wattyText.innerHTML = `<strong>Longe...</strong> (Erraste por ${distanceStr}!)<br>Pontuação: 0XP. ${data.feedback}`;
            document.getElementById('gameWindow').classList.add('shake');
            setTimeout(() => document.getElementById('gameWindow').classList.remove('shake'), 400);
            if(navigator.vibrate) navigator.vibrate(300);
        }

        // PREPARAR PARA A PRÓXIMA RONDA
        btnSubmit.innerText = "PRÓXIMO ALVO ➡️";
        btnSubmit.disabled = false;
        btnSubmit.onclick = nextRound; 
    }

    function nextRound() {
        currentRoundIndex++; // Incrementa a ronda!
        loadQuestion();      // Carrega a nova ou acaba o jogo
    }

    function endGame() {
        document.getElementById('final-score').innerText = currentScore;
        document.getElementById('modal-end').style.display = 'flex';
    }

    // Iniciar jogo no 10º ano
    setGameMode(10);
</script>

</body>
</html>
