<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WATTY - Conserta o Tempo (Definitivo)</title>
    <style>
        :root {
            --bg: #F3EEFF;
            --purple-main: #9B5DE5;
            --purple-dark: #6D3AB5;
            --lilac: #BE95F2;
            --magenta: #F15BB5;
            --white: #FFFFFF;
            --text: #2D1B4D;
            --success: #00BB7E;
            --warning: #F4A261;
            --error: #FF4D4D;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; }

        body {
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: var(--text);
            overflow: hidden;
        }

        .app-container {
            background: var(--white);
            width: 100%;
            max-width: 550px;
            height: 95vh;
            max-height: 850px;
            border-radius: 30px;
            padding: 15px 20px;
            box-shadow: 0 20px 40px rgba(155, 93, 229, 0.15);
            border: 4px solid var(--purple-main);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Tabs de Navegação */
        .tabs-container {
            display: flex;
            justify-content: space-between;
            background: var(--bg);
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 8px 5px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--purple-dark);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active { background: var(--purple-main); color: white; box-shadow: 0 4px 10px rgba(155, 93, 229, 0.3); }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .xp-container { flex-grow: 1; margin: 0 15px 0 0; height: 12px; background: #E0D7F0; border-radius: 6px; overflow: hidden; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, var(--magenta), var(--purple-main)); width: 0%; transition: width 0.5s ease; }

        /* Watty Box */
        .watty-box { display: flex; align-items: center; gap: 15px; background: var(--bg); padding: 10px 15px; border-radius: 20px; margin-bottom: 10px; border: 2px dashed var(--lilac); transition: all 0.3s ease; }
        .watty-box.error-state { border-color: var(--error); background: #FFF0F0; }
        .watty-box.success-state { border-color: var(--success); background: #F0FFF8; }
        .watty-avatar { width: 40px; height: 40px; background: var(--purple-main); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 5px 15px rgba(155, 93, 229, 0.3); flex-shrink: 0; }
        .watty-speech { font-size: 12px; font-weight: bold; line-height: 1.3; }

        .level-title { text-align: center; font-size: 14px; color: var(--magenta); font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }

        /* Cronómetro */
        .timer-container { width: 100%; height: 8px; background: #E0E0E0; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: var(--success); transition: width 1s linear, background-color 0.3s ease; }

        /* Área de Jogo - Drag & Drop */
        .game-area { flex-grow: 1; display: flex; flex-direction: column; gap: 15px; justify-content: space-between;}

        .pool-area {
            background: #F8F5FF;
            border-radius: 15px;
            padding: 15px;
            min-height: 130px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-content: flex-start;
            border: 2px dashed #D1C4E9;
        }

        /* Linha do Tempo Horizontal */
        .timeline-wrapper {
            display: flex;
            align-items: center;
            position: relative;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 5px;
        }

        .timeline-line {
            position: absolute;
            top: 50%; left: 5%; right: 5%; height: 4px;
            background: linear-gradient(to right, var(--purple-main) 50%, transparent 50%);
            background-size: 20px 100%;
            z-index: 1;
            transform: translateY(-50%);
        }

        .timeline-date {
            background: var(--purple-dark);
            color: white;
            padding: 6px 10px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 11px;
            z-index: 3;
            box-shadow: 0 4px 10px rgba(109, 58, 181, 0.4);
            white-space: nowrap;
        }

        .timeline-slots {
            display: flex;
            flex-grow: 1;
            justify-content: space-evenly;
            gap: 6px;
            z-index: 2;
            padding: 0 8px;
        }

        .time-slot {
            flex: 1;
            height: 75px;
            max-width: 90px;
            background: var(--white);
            border: 2px solid var(--lilac);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            position: relative;
            padding: 3px;
        }
        
        .time-slot.drag-over { background: #E8DFF5; transform: scale(1.05); border-color: var(--magenta); border-style: dashed; }

        /* Blocos de Eventos */
        .event-block {
            background: var(--purple-main);
            color: white;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(155, 93, 229, 0.4);
            user-select: none;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .event-block:active { cursor: grabbing; transform: scale(0.95); }
        .event-block.selected { box-shadow: 0 0 0 4px var(--magenta); transform: scale(1.05); z-index: 10; }

        .pool-area .event-block { width: calc(50% - 4px); height: 45px; padding: 5px; }
        .time-slot .event-block { width: 100%; height: 100%; font-size: 10px; padding: 2px; box-shadow: none; }

        /* Animação de Sucesso */
        .reveal-anim { animation: popReveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popReveal { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.1); } 100% { transform: scale(1); background: var(--success); } }

        /* Botões */
        .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 20px; background: linear-gradient(45deg, var(--purple-main), var(--magenta)); color: white; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(155, 93, 229, 0.3); transition: transform 0.2s; margin-top: auto; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-secondary { background: transparent; color: white; border: 2px solid white; margin-top: 10px; }

        /* Modal Overlay */
        .modal-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(45, 27, 77, 0.95); border-radius: 26px; z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 30px; transition: opacity 0.3s;}
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 50% { transform: translateX(8px); } 75% { transform: translateX(-8px); } }
    </style>
</head>
<body>

<div class="app-container" id="gameWindow">
    
    <div class="tabs-container">
        <button class="tab-btn active" id="tab-10" onclick="setGameMode(10)">10º Ano</button>
        <button class="tab-btn" id="tab-11" onclick="setGameMode(11)">11º Ano</button>
        <button class="tab-btn" id="tab-12" onclick="setGameMode(12)">12º Ano</button>
        <button class="tab-btn" id="tab-global" onclick="setGameMode('global')">GLOBAL</button>
    </div>

    <div class="top-bar">
        <div class="xp-container"><div class="xp-bar" id="ui-xp-bar"></div></div>
        <div style="font-weight: bold; font-size: 12px; color: var(--purple-main);"><span id="ui-xp">0</span> XP</div>
    </div>

    <div class="watty-box" id="watty-container">
        <div class="watty-avatar">⏳</div>
        <div class="watty-speech" id="watty-text">Escolhe um ano de escolaridade para começar a consertar o tempo!</div>
    </div>

    <div class="level-title" id="level-title">TEMA DO NÍVEL</div>

    <div class="timer-container">
        <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="game-area">
        <div class="pool-area" id="pool" ondrop="drop(event)" ondragover="allowDrop(event)">
            </div>

        <div class="timeline-wrapper">
            <div class="timeline-line"></div>
            <div class="timeline-date" id="date-start">Início</div>
            <div class="timeline-slots" id="timeline">
                </div>
            <div class="timeline-date" id="date-end">Fim</div>
        </div>
    </div>

    <button class="btn-primary" id="btn-main" onclick="handleMainAction()">VERIFICAR CRONOLOGIA</button>

    <div class="modal-overlay" id="modal-end">
        <div style="font-size: 60px; margin-bottom: 10px;" id="modal-icon">🌟</div>
        <h2 id="modal-title">TEMPO RESTAURADO!</h2>
        <p id="modal-msg">A linha cronológica está segura.</p>
        <button class="btn-primary" id="btn-modal-action" style="margin-top: 15px;">PRÓXIMO DESAFIO ➡️</button>
        <button class="btn-primary btn-secondary" id="btn-review" onclick="hideModal()">REVER TABULEIRO</button>
    </div>
</div>

<script>
    // ---------------------------------------------------------
    // MEGA BASE DE DADOS (12 Níveis)
    // ---------------------------------------------------------
    const rawTimelines = [
        // --- 10º ANO ---
        { ano: 10, tema: "Formação de Portugal (Fácil)", start: "1128", end: "1179", time: 40, events: [
            { id: "10-1a", text: "Batalha S. Mamede", year: "1128" },
            { id: "10-1b", text: "Batalha Ourique", year: "1139" },
            { id: "10-1c", text: "Tratado Zamora", year: "1143" },
            { id: "10-1d", text: "Bula Manifestis", year: "1179" }
        ]},
        { ano: 10, tema: "Atenas e a Democracia", start: "594 a.C.", end: "431 a.C.", time: 40, events: [
            { id: "10-2a", text: "Reformas de Sólon", year: "594 a.C." },
            { id: "10-2b", text: "Reformas Clístenes", year: "508 a.C." },
            { id: "10-2c", text: "Guerras Médicas", year: "490 a.C." },
            { id: "10-2d", text: "Século de Péricles", year: "444 a.C." }
        ]},
        { ano: 10, tema: "Expansão de Roma", start: "753 a.C.", end: "27 a.C.", time: 40, events: [
            { id: "10-3a", text: "Fundação de Roma", year: "753 a.C." },
            { id: "10-3b", text: "Leis das 12 Tábuas", year: "450 a.C." },
            { id: "10-3c", text: "Guerras Púnicas", year: "264 a.C." },
            { id: "10-3d", text: "Império (Augusto)", year: "27 a.C." }
        ]},
        { ano: 10, tema: "Crise do Século XIV", start: "1348", end: "1385", time: 35, events: [
            { id: "10-4a", text: "Peste Negra (PT)", year: "1348" },
            { id: "10-4b", text: "Lei das Sesmarias", year: "1375" },
            { id: "10-4c", text: "Morte D. Fernando", year: "1383" },
            { id: "10-4d", text: "Batalha Aljubarrota", year: "1385" }
        ]},

        // --- 11º ANO ---
        { ano: 11, tema: "O Império Português", start: "1415", end: "1500", time: 40, events: [
            { id: "11-1a", text: "Conquista de Ceuta", year: "1415" },
            { id: "11-1b", text: "Cabo Bojador", year: "1434" },
            { id: "11-1c", text: "Caminho da Índia", year: "1498" },
            { id: "11-1d", text: "Descoberta Brasil", year: "1500" }
        ]},
        { ano: 11, tema: "Crise Dinástica 1580", start: "1578", end: "1640", time: 30, events: [
            { id: "11-2a", text: "Alcácer Quibir", year: "1578" },
            { id: "11-2b", text: "Cortes de Tomar", year: "1581" },
            { id: "11-2c", text: "Domínio Filipino", year: "1581-1640" },
            { id: "11-2d", text: "Restauração", year: "1640" }
        ]},
        { ano: 11, tema: "Iluminismo e Pombal", start: "1750", end: "1777", time: 35, events: [
            { id: "11-3a", text: "Início Governo", year: "1750" },
            { id: "11-3b", text: "Terramoto Lisboa", year: "1755" },
            { id: "11-3c", text: "Expulsão Jesuítas", year: "1759" },
            { id: "11-3d", text: "Morte D. José I", year: "1777" }
        ]},
        { ano: 11, tema: "A Revolução Liberal", start: "1807", end: "1834", time: 40, events: [
            { id: "11-4a", text: "Invasões Francesas", year: "1807" },
            { id: "11-4b", text: "Revolução do Porto", year: "1820" },
            { id: "11-4c", text: "Constituição", year: "1822" },
            { id: "11-4d", text: "Convenção Évora-Monte", year: "1834" }
        ]},

        // --- 12º ANO ---
        { ano: 12, tema: "Fim da Monarquia", start: "1890", end: "1910", time: 35, events: [
            { id: "12-1a", text: "Ultimato Inglês", year: "1890" },
            { id: "12-1b", text: "Ditadura J. Franco", year: "1906" },
            { id: "12-1c", text: "Regicídio", year: "1908" },
            { id: "12-1d", text: "Proclamação República", year: "1910" }
        ]},
        { ano: 12, tema: "O Estado Novo", start: "1926", end: "1933", time: 35, events: [
            { id: "12-2a", text: "Golpe Militar", year: "1926" },
            { id: "12-2b", text: "Salazar (Finanças)", year: "1928" },
            { id: "12-2c", text: "União Nacional", year: "1930" },
            { id: "12-2d", text: "Constituição (E.N.)", year: "1933" }
        ]},
        { ano: 12, tema: "Fim da Ditadura", start: "1961", end: "1974", time: 30, events: [
            { id: "12-3a", text: "Início Guerra Colonial", year: "1961" },
            { id: "12-3b", text: "Primavera Marcelista", year: "1968" },
            { id: "12-3c", text: "Levante Caldas", year: "1974" },
            { id: "12-3d", text: "25 de Abril", year: "1974" }
        ]},
        { ano: 12, tema: "A Democracia Portuguesa", start: "1975", end: "1986", time: 40, events: [
            { id: "12-4a", text: "Verão Quente (PREC)", year: "1975" },
            { id: "12-4b", text: "Constituição Democr.", year: "1976" },
            { id: "12-4c", text: "Adesão CEE", year: "1986" },
            { id: "12-4d", text: "Mário Soares (Pres.)", year: "1986" }
        ]}
    ];

    // Variáveis Globais de Estado
    let currentMode = 10;
    let playQueue = [];
    let currentLevelIndex = 0;
    let xp = 0;
    const maxXPPerLevel = 100;

    let currentTimelineData = null;
    let timeLeft = 30; 
    let timerInterval;
    let gameActive = false;
    let btnMainState = 'CHECK'; // Estados: 'CHECK' ou 'NEXT'

    const pool = document.getElementById('pool');
    const timeline = document.getElementById('timeline');
    const timerBar = document.getElementById('timer-bar');
    const wattyContainer = document.getElementById('watty-container');
    const wattyText = document.getElementById('watty-text');
    const btnMain = document.getElementById('btn-main');
    const modal = document.getElementById('modal-end');

    // ---------------------------------------------------------
    // LÓGICA CENTRAL
    // ---------------------------------------------------------
    function shuffleArray(array) {
        return array.slice().sort(() => Math.random() - 0.5);
    }

    function setGameMode(mode) {
        currentMode = mode;
        
        // UI das Abas
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${mode}`).classList.add('active');

        // Carregar Queue
        if (mode === 'global') {
            playQueue = shuffleArray([...rawTimelines]);
        } else {
            playQueue = shuffleArray(rawTimelines.filter(tl => tl.ano === mode));
        }

        currentLevelIndex = 0;
        xp = 0;
        document.getElementById('ui-xp').innerText = "0";
        document.getElementById('ui-xp-bar').style.width = "0%";
        modal.style.display = 'none';

        loadLevel();
    }

    function loadLevel() {
        if (currentLevelIndex >= playQueue.length) {
            sessionComplete();
            return;
        }

        currentTimelineData = playQueue[currentLevelIndex];
        timeLeft = currentTimelineData.time;
        gameActive = true;
        btnMainState = 'CHECK';

        // Configuração Inicial de UI
        modal.style.display = 'none';
        btnMain.innerText = "VERIFICAR CRONOLOGIA";
        wattyContainer.className = 'watty-box';
        wattyText.innerText = "Organiza os eventos cronologicamente. Cuidado com o tempo!";
        document.getElementById('level-title').innerText = `Nível ${currentLevelIndex + 1}: ${currentTimelineData.tema}`;
        document.getElementById('date-start').innerText = currentTimelineData.start;
        document.getElementById('date-end').innerText = currentTimelineData.end;
        
        // Limpar áreas
        pool.innerHTML = '';
        timeline.innerHTML = '';
        selectedMobileBlock = null;

        // Renderizar Blocos Soltos
        const shuffledEvents = shuffleArray(currentTimelineData.events);
        shuffledEvents.forEach(event => {
            const block = document.createElement('div');
            block.className = 'event-block';
            block.id = event.id;
            block.innerText = event.text; 
            block.draggable = true;
            block.ondragstart = drag;
            block.onclick = () => selectBlock(block);
            pool.appendChild(block);
        });

        // Renderizar Espaços (Slots)
        currentTimelineData.events.forEach((_, index) => {
            const slot = document.createElement('div');
            slot.className = 'time-slot';
            slot.id = `slot-${index}`;
            slot.ondrop = drop;
            slot.ondragover = allowDrop;
            slot.ondragleave = dragLeave;
            slot.onclick = () => dropToSlotMobile(slot);
            timeline.appendChild(slot);
        });

        clearInterval(timerInterval);
        startTimer();
    }

    function handleMainAction() {
        if (btnMainState === 'CHECK') {
            checkTimeline();
        } else if (btnMainState === 'NEXT') {
            currentLevelIndex++;
            loadLevel();
        }
    }

    // ---------------------------------------------------------
    // TEMPO
    // ---------------------------------------------------------
    function startTimer() {
        timerBar.style.width = "100%";
        timerBar.style.backgroundColor = "var(--success)";
        
        timerInterval = setInterval(() => {
            if (!gameActive) return;
            timeLeft--;
            const percentage = (timeLeft / currentTimelineData.time) * 100;
            timerBar.style.width = percentage + "%";

            if (percentage < 50 && percentage > 20) timerBar.style.backgroundColor = "var(--warning)";
            if (percentage <= 20) timerBar.style.backgroundColor = "var(--error)";

            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                gameActive = false; 
                gameOverTimeOut();
            }
        }, 1000);
    }

    // ---------------------------------------------------------
    // DRAG & DROP & TOUCH
    // ---------------------------------------------------------
    let selectedMobileBlock = null;

    function allowDrop(ev) { ev.preventDefault(); if (ev.target.classList.contains('time-slot')) ev.target.classList.add('drag-over'); }
    function dragLeave(ev) { if (ev.target.classList.contains('time-slot')) ev.target.classList.remove('drag-over'); }
    function drag(ev) { if (!gameActive) return; ev.dataTransfer.setData("text", ev.target.id); }

    function drop(ev) {
        ev.preventDefault();
        if (!gameActive) return;
        let target = ev.target;
        if (target.classList.contains('time-slot')) target.classList.remove('drag-over');
        if (!target.classList.contains('time-slot') && target.id !== 'pool') {
            target = target.closest('.time-slot') || document.getElementById('pool');
        }
        if (!target) return;
        const data = ev.dataTransfer.getData("text");
        const elementToMove = document.getElementById(data);
        if (target.classList.contains('time-slot') && target.children.length > 0) {
            pool.appendChild(target.children[0]);
        }
        target.appendChild(elementToMove);
    }

    function selectBlock(block) {
        if (!gameActive) return;
        if (selectedMobileBlock) selectedMobileBlock.classList.remove('selected');
        if (selectedMobileBlock === block) selectedMobileBlock = null;
        else { selectedMobileBlock = block; block.classList.add('selected'); }
    }

    function dropToSlotMobile(slot) {
        if (!gameActive || !selectedMobileBlock) return;
        if (slot.children.length > 0) pool.appendChild(slot.children[0]);
        slot.appendChild(selectedMobileBlock);
        selectedMobileBlock.classList.remove('selected');
        selectedMobileBlock = null;
    }

    pool.onclick = (e) => {
        if (e.target.id === 'pool' && selectedMobileBlock) {
            pool.appendChild(selectedMobileBlock);
            selectedMobileBlock.classList.remove('selected');
            selectedMobileBlock = null;
        }
    }

    // ---------------------------------------------------------
    // VERIFICAÇÃO E FINAIS
    // ---------------------------------------------------------
    function checkTimeline() {
        if (!gameActive) return;

        const slots = document.querySelectorAll('.time-slot');
        let order = [];
        let isFull = true;

        slots.forEach(s => {
            if (s.children.length > 0) order.push(s.children[0].id);
            else isFull = false;
        });
        
        if(!isFull) { 
            document.getElementById('gameWindow').classList.add('shake');
            setTimeout(() => document.getElementById('gameWindow').classList.remove('shake'), 400);
            wattyContainer.classList.add('error-state');
            wattyText.innerText = "Preenche todos os espaços antes de verificar!";
            return; 
        }

        const isCorrect = order.every((id, i) => id === currentTimelineData.events[i].id);

        if(isCorrect) {
            gameWin(order);
        } else {
            document.getElementById('watty-text').innerText = "A ordem está errada! Troca os blocos e tenta novamente.";
            document.getElementById('gameWindow').classList.add('shake');
            setTimeout(() => document.getElementById('gameWindow').classList.remove('shake'), 400);
            wattyContainer.className = 'watty-box error-state';
        }
    }

    function gameWin(order) {
        gameActive = false; 
        clearInterval(timerInterval);
        
        xp += maxXPPerLevel;
        document.getElementById('ui-xp').innerText = xp;
        document.getElementById('ui-xp-bar').style.width = ((currentLevelIndex + 1) / playQueue.length * 100) + "%";
        
        // Efeito de revelação de Datas
        order.forEach((id, i) => {
            const b = document.getElementById(id);
            if(b) {
                b.innerHTML = `<span>${b.innerText}</span><br><b style='font-size:11px; color:#FFD166'>${currentTimelineData.events[i].year}</b>`;
                b.classList.add('reveal-anim');
            }
        });

        setTimeout(() => {
            document.getElementById('modal-icon').innerText = "🌟";
            document.getElementById('modal-title').innerText = "TEMPO RESTAURADO!";
            document.getElementById('modal-msg').innerText = `Excelente! A cronologia está perfeita.`;
            
            const btnModal = document.getElementById('btn-modal-action');
            btnModal.innerText = "PRÓXIMO DESAFIO ➡️";
            btnModal.onclick = () => { currentLevelIndex++; loadLevel(); };
            
            document.getElementById('btn-review').style.display = 'block';
            modal.style.display = 'flex';
        }, 1200);
    }

    function gameOverTimeOut() {
        document.getElementById('modal-icon').innerText = "💥";
        document.getElementById('modal-title').innerText = "COLAPSO TEMPORAL!";
        document.getElementById('modal-msg').innerText = "O tempo esgotou-se antes de restaurares a cronologia.";
        
        const btnModal = document.getElementById('btn-modal-action');
        btnModal.innerText = "TENTAR NOVAMENTE 🔄";
        btnModal.onclick = loadLevel; // Repete o nível atual

        document.getElementById('btn-review').style.display = 'none';
        modal.style.display = 'flex';
    }

    function sessionComplete() {
        gameActive = false;
        clearInterval(timerInterval);
        document.getElementById('modal-icon').innerText = "🏆";
        document.getElementById('modal-title').innerText = "MÓDULO CONCLUÍDO!";
        document.getElementById('modal-msg').innerText = `Dominaste todas as cronologias deste módulo! Acumulaste ${xp} XP.`;
        
        const btnModal = document.getElementById('btn-modal-action');
        btnModal.innerText = "NOVA SESSÃO";
        btnModal.onclick = () => setGameMode(currentMode);
        
        document.getElementById('btn-review').style.display = 'none';
        modal.style.display = 'flex';
    }

    function hideModal() {
        modal.style.display = 'none';
        
        // Transforma o Botão Principal para avançar
        btnMainState = 'NEXT';
        btnMain.innerText = "AVANÇAR PARA PRÓXIMO NÍVEL ➡️";

        wattyContainer.className = 'watty-box success-state';
        wattyText.innerText = "Modo de Revisão. Estuda bem as datas reveladas!";
    }

    // Arranque inicial do jogo
    setGameMode(10);
</script>

</body>
</html>
