<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Módulo 2: O Lobo de Wall Street (Mecanismos de Mercado)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f2027; color: white; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        h1 { color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }
        h3 { color: #ecf0f1; margin-top: 0; font-weight: normal; font-size: 16px;}
        
        #setup-screen { background: #2c3e50; padding: 40px; border-radius: 15px; display: inline-block; margin-top: 50px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border-top: 5px solid #f1c40f;}
        input { padding: 10px; font-size: 18px; width: 60px; text-align: center; border-radius: 5px; border: none; margin: 10px; }
        
        #game-screen { display: none; justify-content: center; gap: 30px; margin-top: 20px; }
        #board-container { position: relative; width: 600px; height: 600px; background-color: #ecf0f1; border: 5px solid #f1c40f; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #board { display: grid; grid-template-columns: repeat(10, 60px); grid-template-rows: repeat(10, 60px); width: 100%; height: 100%; }
        
        .cell { border: 1px solid #bdc3c7; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #2c3e50; position: relative;}
        .cell:nth-child(even) { background-color: #e0e6ed; }
        .cell:nth-child(odd) { background-color: #f4f7f6; }
        .cell.start { background-color: #3498db; color: white; }
        .cell.finish { background-color: #f1c40f; color: #2c3e50; font-size: 24px;}
        .cell.trap { color: #e74c3c; font-weight: 900; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .player { width: 20px; height: 20px; border-radius: 50%; position: absolute; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.7); transition: all 0.6s ease-in-out; z-index: 10; margin-top: -10px; margin-left: -10px; }
        
        #panel { background: #2c3e50; padding: 20px; border-radius: 10px; width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border-top: 5px solid #3498db;}
        button { background-color: #e67e22; color: white; border: none; padding: 15px 20px; font-size: 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; box-shadow: 0 4px 0 #d35400; }
        button:hover { background-color: #d35400; transform: translateY(2px); box-shadow: 0 2px 0 #a04000; }
        button:disabled { background-color: #7f8c8d; box-shadow: none; transform: none; cursor: not-allowed; }
        
        #dice-display { font-size: 60px; margin: 15px 0; background: white; color: #2c3e50; border-radius: 15px; width: 100px; height: 100px; line-height: 100px; display: inline-block; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        .score-board { margin-top: 15px; text-align: left; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .score-board::-webkit-scrollbar { width: 8px; }
        .score-board::-webkit-scrollbar-thumb { background: #f1c40f; border-radius: 4px; }
        
        .team-score { margin: 8px 0; font-size: 16px; padding: 10px; border-radius: 5px; background: rgba(255,255,255,0.1); transition: 0.3s; position: relative; }
        .status-icons { float: right; font-size: 20px; }
        
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
        #modal-box { background: #ecf0f1; color: #2c3e50; padding: 40px; border-radius: 15px; max-width: 600px; text-align: center; box-shadow: 0 0 50px rgba(241, 196, 15, 0.5); font-size: 20px; border-top: 10px solid #f1c40f; }
        #modal-text { margin-bottom: 25px; line-height: 1.5; font-size: 18px; }
        #modal-choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .choice-btn { background-color: #34495e; color: white; font-size: 17px; box-shadow: 0 4px 0 #2c3e50; padding: 12px; border: none; border-radius: 5px; cursor: pointer; }
        .choice-btn:hover { background-color: #2c3e50; transform: translateY(2px); box-shadow: 0 2px 0 #1a252f; }
        #modal-btn { background-color: #27ae60; box-shadow: 0 4px 0 #2ecc71; display: none; color: white; border: none; cursor: pointer; padding: 15px;}
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>📈 O Lobo do Mercado</h1>
        <h3>Módulo 2: O Mecanismo de Mercado. Ganha quem tiver mais Lucro (💰).<br>O último a chegar ao fim abre Falência!</h3>
        <h2>Quantas Empresas vão competir?</h2>
        <input type="number" id="num-players" min="2" max="20" value="4"><br><br>
        <button onclick="iniciarJogo()">Entrar na Bolsa e Começar!</button>
    </div>

    <div id="game-screen">
        <div id="board-container">
            <div id="board"></div>
        </div>

        <div id="panel">
            <h2 id="turn-indicator">A preparar...</h2>
            <div id="dice-display">🎲</div>
            <button id="btn-roll" onclick="lancarDado()">Lançar Dado</button>
            <div class="score-board" id="scores"></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-box">
            <h1 id="modal-title">Forças de Mercado!</h1>
            <div id="modal-text">Mensagem...</div>
            <div id="modal-choices"></div>
            <button id="modal-btn" onclick="fecharModalAposEscolha()">Avançar</button>
        </div>
    </div>

    <script>
        let players = [];
        let currentTurn = 0;
        let isMoving = false;
        let gameEnded = false;
        
        const colors = [
            "#e74c3c", "#3498db", "#2ecc71", "#9b59b6", "#f39c12", "#1abc9c",

            "#f1c40f", "#d35400", "#c0392b", "#bdc3c7", "#7f8c8d", "#ff9ff3", 
            "#feca57", "#ff6b6b", "#48dbfb", "#1dd1a1", "#0abde3", "#10ac84"
        ];
        
        let especial = {};
        const boardDiv = document.getElementById('board');
        const boardContainer = document.getElementById('board-container');
        let cellsCoords = {}; 

        // 🎲 BANCO DE 25 EVENTOS MÓDULO 2 (MECANISMOS DE MERCADO, OFERTA, PROCURA)
const eventosPossiveis = [
            // --- OFERTA, PROCURA E EQUILÍBRIO ---
            { titulo: "📉 Excesso de Oferta", texto: "O preço está acima do Equilíbrio. Tens os armazéns cheios e ninguém compra.", opcoes: [{ textoBotao: "Baixo o preço para o Equilíbrio.", resultados: [{ txt: "Limpaste o stock e recuperaste o dinheiro investido.", isGood: true }, { txt: "Baixaste tanto que os clientes desconfiaram da qualidade.", isGood: false }] }, { textoBotao: "Mantenho o preço e reduzo a produção.", resultados: [{ txt: "Controlaste a oferta e mantiveste a margem de luxo.", isGood: true }, { txt: "Os produtos perderam a validade no armazém. Prejuízo.", isGood: false }] }]},

            { titulo: "✨ Alteração de Gostos", texto: "Um influenciador usou o teu produto. A Procura deslocou-se para a Direita!", opcoes: [{ textoBotao: "Aumento a produção à pressa.", resultados: [{ txt: "Apanhaste a onda e vendeste milhões.", isGood: true }, { txt: "Investiste na fábrica mas a moda passou numa semana.", isGood: false }] }, { textoBotao: "Aumento o preço e crio exclusividade.", resultados: [{ txt: "Esgotaste o stock com uma margem de lucro brutal.", isGood: true }, { txt: "Os seguidores acharam caro e cancelaram a marca.", isGood: false }] }]},

            { titulo: "🖨️ Bens Complementares", texto: "Vendes Tinteiros. O preço das Impressoras baixou brutalmente.", opcoes: [{ textoBotao: "Aumento a produção de Tinteiros.", resultados: [{ txt: "Mais impressoras vendidas = Mais tinteiros comprados!", isGood: true }, { txt: "Fizeste tinteiros incompatíveis com os modelos novos.", isGood: false }] }, { textoBotao: "Subo o preço dos Tinteiros.", resultados: [{ txt: "Eles precisam de tinta! Pagaram o que pediste.", isGood: true }, { txt: "Surgiram marcas brancas que te roubaram o mercado.", isGood: false }] }]},

            { titulo: "👟 Concorrência Monopolística", texto: "Vendes calçado. Há muitos vendedores, mas tu queres Diferenciar o produto.", opcoes: [{ textoBotao: "Gasto fortunas em Branding e Publicidade.", resultados: [{ txt: "Criaste uma marca de 'culto'. Preços disparam!", isGood: true }, { txt: "O marketing falhou e ficaste com a dívida.", isGood: false }] }, { textoBotao: "Foco no Preço. Vendo as mais baratas.", resultados: [{ txt: "Volume massivo salvou as tuas contas.", isGood: true }, { txt: "Não consegues competir com o custo da produção asiática.", isGood: false }] }]},
            { titulo: "🍎 Concorrência Perfeita", texto: "Produzes laranjas. És 'Price Taker', o mercado impõe o preço.", opcoes: [{ textoBotao: "Tento vender acima do preço de mercado.", resultados: [{ txt: "Mentiste dizendo que eram biológicas e colou.", isGood: true }, { txt: "A procura é perfeitamente elástica. Vendeste zero.", isGood: false }] }, { textoBotao: "Foco-me em produzir mais quantidade.", resultados: [{ txt: "Atingiste economias de escala e lucraste na quantidade.", isGood: true }, { txt: "Excesso de laranjas no mercado afundou o preço global.", isGood: false }] }]},
            { titulo: "🧱 Barreiras à Entrada", texto: "Um mercado novo exige 10 milhões em licenças para entrar.", opcoes: [{ textoBotao: "Peço um empréstimo e salto a barreira.", resultados: [{ txt: "Entraste no Oligopólio! Lucros imensos garantidos.", isGood: true }, { txt: "Não conseguiste pagar os juros do empréstimo.", isGood: false }] }, { textoBotao: "Desisto e procuro um mercado sem barreiras.", resultados: [{ txt: "Poupaste recursos e encontraste um nicho bom.", isGood: true }, { txt: "Ficaste num mercado saturado onde ninguém lucra.", isGood: false }] }]},
            
            // --- ELASTICIDADE E PREÇOS ---

            { titulo: "💊 Bens Inelásticos", texto: "Vendes um medicamento único. A procura é super inelástica.", opcoes: [{ textoBotao: "Aumento o preço 50%.", resultados: [{ txt: "A lei do mercado funcionou. Lucros obscenos.", isGood: true }, { txt: "O Estado interveio e impôs-te um preço máximo.", isGood: false }] }, { textoBotao: "Mantenho o preço ético.", resultados: [{ txt: "Ganhaste a confiança do mercado e do regulador.", isGood: true }, { txt: "Perdeste a oportunidade de faturar para reinvestir.", isGood: false }] }]},

        function gerarCasasAleatorias() {

        function iniciarJogo() {
            let numInput = document.getElementById('num-players').value;
            let num = parseInt(numInput, 10);
            if (isNaN(num) || num < 2 || num > 20) num = 4; 
            
            players = [];
            for(let i = 0; i < num; i++) {
                let corDoJogador = colors[i % colors.length]; 
                players.push({ id: i, name: `Empresa ${i+1}`, pos: 1, pe: 100, color: corDoJogador, skip: 0, shield: false, finished: false });
                // NOTA: Começam com 100 de Lucro para não falirem à primeira falha!
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            gerarCasasAleatorias(); 
            criarTabuleiro();
            criarPeoes();
            atualizarPainel();
        }

        function criarTabuleiro() {
            boardDiv.innerHTML = ""; 
            for (let row = 9; row >= 0; row--) {
                for (let col = 0; col < 10; col++) {
                    let cellNum = (row % 2 === 1) ? (row * 10 + (10 - col)) : (row * 10 + (col + 1));
                    let cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    if(cellNum === 1) cellDiv.classList.add('start');
                    if(cellNum === 100) cellDiv.classList.add('finish');
                    
                    if(cellNum === 88 || cellNum === 94 || cellNum === 98) {
                        cellDiv.classList.add('trap');
                    }

                    cellDiv.innerText = (cellNum === 100) ? "👑" : cellNum;
                    cellDiv.id = 'cell-' + cellNum;
                    boardDiv.appendChild(cellDiv);
                    
                    setTimeout(() => {
                        let rect = cellDiv.getBoundingClientRect();
                        let containerRect = boardContainer.getBoundingClientRect();
                        cellsCoords[cellNum] = { x: rect.left - containerRect.left + 30, y: rect.top - containerRect.top + 30 };
                        if (cellNum === 100) atualizarPosicoes(); 
                    }, 200);
                }
            }
        }

        function criarPeoes() {
            document.querySelectorAll('.player').forEach(p => p.remove());
            players.forEach(p => {
                let pDiv = document.createElement('div');
                pDiv.className = 'player';
                pDiv.id = 'p-' + p.id;
                pDiv.style.backgroundColor = p.color;
                boardContainer.appendChild(pDiv);
            });
        }

        function atualizarPosicoes() {
            let raio = 15;
            players.forEach((p, index) => {
                let pDiv = document.getElementById('p-' + p.id);
                if(pDiv && cellsCoords[p.pos]) {
                    let angulo = (index / players.length) * (2 * Math.PI);
                    let offsetX = raio * Math.cos(angulo);
                    let offsetY = raio * Math.sin(angulo);
                    
                    if (p.pos === 1 || p.pos === 100) {
                         offsetX = (index % 4) * 8 - 12;
                         offsetY = Math.floor(index / 4) * 8 - 12;
                    }
                    
                    pDiv.style.left = (cellsCoords[p.pos].x + offsetX) + 'px';
                    pDiv.style.top = (cellsCoords[p.pos].y + offsetY) + 'px';
                }
            });
        }

        function atualizarPainel() {
            if(gameEnded) return;
            
            let scoreHtml = '<h3>Ranking (Lucro 💰)</h3>';
            let sortedPlayers = [...players].sort((a,b) => b.pe - a.pe);

            sortedPlayers.forEach(p => {
                let border = (!p.finished && p.id === players[currentTurn].id) ? `border: 2px solid ${p.color}; font-weight: bold;` : '';
                let icons = "";
                if (p.finished) icons += "👑 ";
                if (p.shield) icons += "🛡️ ";
                if (p.skip > 0) icons += "⏳ ";

                scoreHtml += `<div class="team-score" style="${border} border-left: 10px solid ${p.color};">
                    ${p.name}: <b>${p.pe} 💰</b> <small>(Casa ${p.pos})</small>
                    <div class="status-icons">${icons}</div>
                </div>`;
            });
            document.getElementById('scores').innerHTML = scoreHtml;
            
            let pAtual = players[currentTurn];
            if (!pAtual.finished) {
                document.getElementById('turn-indicator').innerText = `Turno: ${pAtual.name}`;
                document.getElementById('turn-indicator').style.color = pAtual.color;
            }
        }

        function passarTurno() {
            if(gameEnded) return;
            
            let ativos = players.filter(p => !p.finished);
            if (ativos.length <= 1) {
                avaliarVitoriaFinal();
                return;
            }

            do {
                currentTurn = (currentTurn + 1) % players.length;
            } while (players[currentTurn].finished);

            atualizarPainel();
            document.getElementById('btn-roll').disabled = false;
            document.getElementById('dice-display').innerText = "🎲";
            isMoving = false;
        }

        function lancarDado() {
            if(isMoving || gameEnded) return;
            isMoving = true;
            document.getElementById('btn-roll').disabled = true;
            
            let p = players[currentTurn];
            let diceDiv = document.getElementById('dice-display');
            
            let tempoAnimacao = 0;
            let anim = setInterval(() => {
                diceDiv.innerText = Math.floor(Math.random() * 6) + 1;
                tempoAnimacao += 100;
                if(tempoAnimacao > 1000) {
                    clearInterval(anim);
                    let dadoFinal = Math.floor(Math.random() * 6) + 1;
                    diceDiv.innerText = dadoFinal;
                    setTimeout(() => moverPeao(p, dadoFinal), 500);
                }
            }, 100);
        }

        function avaliarVitoriaFinal() {
            gameEnded = true;
            let finalistas = players.filter(p => p.finished);
            let desqualificado = players.find(p => !p.finished); 
            
            if (finalistas.length === 0) finalistas = players; 

            let vencedor = finalistas[0];
            finalistas.forEach(p => { if(p.pe > vencedor.pe) vencedor = p; });

            document.getElementById('modal-title').innerText = "🎉 FIM DO EXERCÍCIO FISCAL! 🎉";
            
            let msgTexto = `A Bolsa de Valores fechou!<br><br>`;
            if (desqualificado) {
                msgTexto += `<span style="color:#e74c3c; font-size:18px;">🛑 A <b>${desqualificado.name}</b> faliu por não acompanhar o mercado e foi eliminada!</span><br><br>`;
            }
            msgTexto += `A Empresa que gerou mais Lucro (💰) a dominar as Forças de Mercado foi:<br><br><b><span style="color:${vencedor.color}; font-size:32px;">${vencedor.name}</span></b><br>com uns incríveis <b>${vencedor.pe} 💰!</b>`;

            document.getElementById('modal-text').innerHTML = msgTexto;
            document.getElementById('modal-choices').innerHTML = "";
            document.getElementById('modal-btn').style.display = "none"; 
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function moverPeao(jogador, dado) {
            let novaPos = jogador.pos + dado;
            
            if (novaPos >= 100) {
                jogador.pos = 100;
                jogador.finished = true; 
                atualizarPosicoes();
                atualizarPainel();
                mostrarMensagemSimples("👑 Dominaste o Mercado!", `Parabéns ${jogador.name}, garantiste o topo da Bolsa! O teu Lucro está guardado. Aguarda que a concorrência termine.`);
                return;
            }
            
            jogador.pos = novaPos;
            atualizarPosicoes(); 
            atualizarPainel();

            setTimeout(() => {
                if (especial[novaPos]) {
                    if (especial[novaPos].isInstantSwap) {
                        aplicarSwapInstantaneo(especial[novaPos], novaPos);
                    } else {
                        mostrarDecisao(especial[novaPos], novaPos);
                    }
                } else {
                    mostrarMensagemSimples("Caminho Livre 📈", `Aterraste em segurança na casa ${novaPos}. O mercado está calmo.`);
                }
            }, 700);
        }

        function mostrarDecisao(evento, casaAtual) {
            document.getElementById('modal-title').innerText = evento.titulo;
            document.getElementById('modal-text').innerHTML = `<b>Dinâmica de Mercado:</b><br>${evento.texto}<br><br><i>Qual é a tua estratégia?</i>`;
            
            let choicesDiv = document.getElementById('modal-choices');
            choicesDiv.innerHTML = ""; 
            document.getElementById('modal-btn').style.display = "none"; 

            evento.opcoes.forEach(opcao => {
                let btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = opcao.textoBotao;
                btn.onclick = () => aplicarEscolha(opcao, casaAtual);
                choicesDiv.appendChild(btn);
            });

            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function aplicarEscolha(opcao, casaAtual) {
            let p = players[currentTurn];
            
            let sorteioIndex = Math.floor(Math.random() * opcao.resultados.length);
            let resultadoFinal = opcao.resultados[sorteioIndex];

            let isBad = !resultadoFinal.isGood;
            let resultText = `<b>A tua Estratégia:</b> ${opcao.textoBotao}<br><br><b>O que aconteceu:</b> ${resultadoFinal.txt}<br><br>`;

            // Se for escudo (apenas cosmético se existissem, mas aqui temos matemática direta)
            if (isBad && p.shield) {
                p.shield = false; 
                resultText += `<span style="color:#f39c12;">🛡️ <b>RESERVA FINANCEIRA!</b> O teu fundo de maneio protegeu-te deste azar!</span>`;
            } else {
                // Matemática de Mercado
                let moveVal = 0;
                let lucroVal = 0;

                if (!isBad) {
                    moveVal = Math.floor(Math.random() * 4) + 1; // +1 a 4
                    lucroVal = moveVal * (Math.floor(Math.random() * 20) + 20); // +20 a +80 Lucro
                } else {
                    moveVal = -(Math.floor(Math.random() * 4) + 1); // -1 a -4
                    lucroVal = moveVal * (Math.floor(Math.random() * 20) + 20); // Perde Lucro
                }

                p.pe += lucroVal;
                p.pos += moveVal;

                if (resultadoFinal.shield) p.shield = true;
                
                let efeitos = [];
                efeitos.push(`${lucroVal > 0 ? '+' : ''}${lucroVal} 💰`);
                efeitos.push(`${moveVal > 0 ? 'Avanças' : 'Recuas'} ${Math.abs(moveVal)} casas`);

                if(p.pos < 1) p.pos = 1;
                if(p.pos > 100) p.pos = 100; 
                
                atualizarPosicoes();

                if (efeitos.length > 0) resultText += `<b>Impacto no Negócio:</b> ${efeitos.join(' | ')}`;
            }

            // Não apagamos a casa (Rejogabilidade)

            document.getElementById('modal-text').innerHTML = resultText;
            document.getElementById('modal-choices').innerHTML = ""; 
            document.getElementById('modal-btn').style.display = "inline-block"; 
            atualizarPainel();
        }

        // AS ARMADILHAS DE SWAP DE MERCADO
        function aplicarSwapInstantaneo(evento, casaAtual) {
            let p = players[currentTurn];
            let resultText = `<b>${evento.texto}</b><br><br>`;
            
            let ativos = players.filter(j => !j.finished); 
            let target = p;
            let type = evento.swapType;

            if (type === 'random') {
                type = Math.random() > 0.5 ? 'first' : 'last';
            }

            if (type === 'first') {
                ativos.forEach(j => { if (j.pos > target.pos) target = j; });
                if (target.id === p.id) {
                    ativos.forEach(j => { if (j.pos < target.pos) target = j; });
                    resultText += `Eras o Líder de Mercado! Uma bolha especulativa rebentou e caíste para Último! 📉`;
                } else {
                    resultText += `OPA Aprovada! Assumiste a liderança de mercado do 1º classificado! 🚀`;
                }
            } else {
                ativos.forEach(j => { if (j.pos < target.pos) target = j; });
                if (target.id === p.id) {
                    resultText += `Já eras o último da bolsa, não ficas pior. Sobreviveste!`;
                } else {
                    resultText += `A tua empresa sofreu um ataque informático! Caíste para o Último lugar! 📉`;
                }
            }
            
            if (target.id !== p.id) {
                resultText += `<br><br><span style="color:#f39c12;"><b>🔄 ATENÇÃO: Trocaste fisicamente de Posição E roubaste o Lucro (💰) dessa empresa!</b></span>`;
                
                let tempPos = p.pos;
                p.pos = target.pos;
                target.pos = tempPos;

                let tempPe = p.pe;
                p.pe = target.pe;
                target.pe = tempPe;
            }

            delete especial[casaAtual]; // Casas de swap desaparecem após uso
            atualizarPosicoes();
            atualizarPainel();

            mostrarMensagemSimples(evento.titulo, resultText);
        }

        function mostrarMensagemSimples(titulo, texto) {
            document.getElementById('modal-title').innerText = titulo;
            document.getElementById('modal-text').innerHTML = texto;
            document.getElementById('modal-choices').innerHTML = "";
            document.getElementById('modal-btn').style.display = "inline-block";
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function fecharModalAposEscolha() {
            document.getElementById('modal-overlay').style.display = 'none';
            setTimeout(passarTurno, 400); 
        }
    </script>
</body>
